# Fabric Schema Drift Detective - configuration
# Secrets NEVER go here. They live in .env (see .env.example).
# ${VAR} placeholders are resolved from environment at load time.

mode: simulate            # simulate | live | source  (CLI --mode overrides)

# Direct-connect upstream source (mode: source). Catches drift at the
# Bronze door, BEFORE it lands in Fabric. If the source is already
# mirrored/shortcut into a lakehouse, use mode: live instead - the
# FabricBackend sees it there, no source backend needed.
source:
  type: ""                # hana | snowflake (see CONTRIBUTING.md to add more)
  schema: ""              # source schema to snapshot
  layer: bronze           # medallion layer the source feeds
  # Credentials come from .env, never from here:
  #   HANA:      HANA_HOST, HANA_PORT, HANA_USER, HANA_PASSWORD
  #   Snowflake: SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER, SNOWFLAKE_PASSWORD,
  #              SNOWFLAKE_DATABASE (+ optional WAREHOUSE, ROLE)

fabric:
  # auth: client_secret (SPN via .env) | managed_identity (Azure compute)
  #       | notebookutils (inside a Fabric notebook) | default (full chain)
  # empty = auto-detect (notebookutils inside Fabric, else client_secret)
  auth_method: ""
  workspace_id: ""        # GUID of the Fabric workspace
  lakehouse_id: ""        # Bronze+Silver lakehouse item id
  warehouse_id: ""        # Gold warehouse item id
  # Where the Gold star schema lives: warehouse (default, dbo schema)
  # or lakehouse (gold schema / gold_ table prefix on the lakehouse)
  gold_source: "warehouse"
  semantic_model_id: ""   # semantic model item id
  dataflow_ids: []        # Dataflow Gen2 item ids
  pipeline_ids: []        # Data pipeline item ids
  api_base: "https://api.fabric.microsoft.com/v1"
  # SQL analytics endpoint (optional, for direct schema queries)
  sql_endpoint: ""
  sql_database: ""

simulate:
  db_path: "sample_data/warehouse.duckdb"
  semantic_model_path: "sample_data/generated/semantic_model.json"
  reports_path: "sample_data/generated/reports.json"

baseline:
  dir: ".baselines"       # where per-layer schema snapshots are stored

lineage:
  # Optional Bronze->Silver->Gold column-mapping manifest (YAML or JSON).
  # Empty = built-in AdventureWorksLT demo mappings. Declare your own
  # medallion's transformation contract here — see
  # examples/lineage.example.yaml for the format.
  manifest: ""
  # Optional cross-workspace topology manifest. When present, drift
  # whose blast radius crosses a workspace boundary is reported as
  # cross_workspace_break (with link type + tenant boundary detail).
  # See sample_data/workspaces.json and docs/CROSS_WORKSPACE.md.
  workspaces_manifest: "sample_data/workspaces.json"

llm:
  provider: anthropic
  model: "claude-opus-4-6"   # override freely
  max_tokens: 4096
  max_retries: 3
  # set to false to use the deterministic mock reasoner (no API calls)
  enabled: true
  # agentic tool-use runs (python main.py --agent <name>)
  agents:
    model: ""                # override model for agents; "" = llm.model
    max_total_tokens: 200000 # cumulative budget per agent run
    run_log_dir: ".agent_runs"  # JSONL transcript per run

git:
  reports_dir: "pbip_reports"   # folder containing PBIP / TMDL sources
  remote: "origin"
  base_branch: "main"
  branch_prefix: "drift-fix/"
  # pr via `gh` CLI if available, else GitHub REST using GITHUB_TOKEN + GITHUB_REPO
  use_gh_cli: true

notifications:
  teams:
    enabled: false
    mode: webhook          # webhook | graph
    webhook_url: ${TEAMS_WEBHOOK}
    team_id: ""            # if mode=graph
    channel_id: ""         # if mode=graph
  outlook:
    enabled: false
    mode: graph            # graph | smtp
    sender: "alerts@company.com"
    to: ["data-team@company.com"]
    cc: []
    smtp_host: ""
    smtp_port: 587
  slack:
    enabled: false
    mode: webhook          # webhook | bot
    webhook_url: ${SLACK_WEBHOOK}
    bot_token: ${SLACK_BOT_TOKEN}
    channel: "#data-alerts"
  console:
    enabled: true          # rich console output, always safe
