name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project + dev toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy ruff bandit pytest-cov types-PyYAML types-requests

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy

      - name: Security scan (bandit)
        run: bandit -c pyproject.toml -r fabric_drift_detective main.py -q

      - name: Tests + coverage gate
        run: pytest -q --cov --cov-report=term --cov-fail-under=75

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Audit dependencies (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -r requirements.txt
          pip-audit
